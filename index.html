<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek AI 助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== 侧边栏 ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">🧠 DeepSeek</span>
            <button class="new-chat-btn" id="newChatBtn">＋ 新对话</button>
        </div>
        <div class="sidebar-actions">
            <button class="sidebar-theme-btn" id="sidebarThemeBtn">🌙 切换主题</button>
            <button class="sidebar-clear-btn" id="sidebarClearBtn">🗑️ 清空所有</button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 会话列表由 JS 动态渲染 -->
        </div>
        <div class="sidebar-footer">
            <span class="session-count" id="sessionCount">0 个对话</span>
        </div>
    </aside>

    <!-- ===== 侧边栏遮罩（移动端） ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== 主区域 ===== -->
    <div class="main-wrapper">

        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <span class="logo-icon">🧠</span>
                <span class="logo-text">DeepSeek</span>
            </div>
            <div class="header-right">
                <span class="session-title" id="sessionTitle">新对话</span>
                <button class="header-theme-btn" id="headerThemeBtn" title="切换主题">🌙</button>
            </div>
        </header>

        <!-- 聊天区域 -->
        <main class="chat-container" id="chatContainer">
            <div class="chat-box" id="chatBox">
                <div class="welcome-msg">
                    <div class="welcome-icon">👋</div>
                    <h2>你好，我是 DeepSeek</h2>
                    <p>点击「＋ 新对话」开始聊天，所有记录自动保存</p>
                </div>
            </div>
        </main>

        <!-- 底部输入区 -->
        <footer class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="输入你的问题..." 
                    autocomplete="off"
                />
                <button id="sendBtn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-hint">按 Enter 发送 · 左侧管理所有对话</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
