<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <title>DeepSeek Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <input type="password" id="apiKeyInput" placeholder="粘贴 DeepSeek API Key (sk-...)" autocomplete="off">

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="发消息…" autofocus>
    <button onclick="send()">发送</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
