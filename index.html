<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek AI 助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== 侧边栏遮罩（移动端） ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== 侧边栏 ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <span>🧠</span>
                <span>DeepSeek</span>
            </div>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>

        <button class="new-chat-btn" id="newChatBtn">
            <span>＋</span> 新建对话
        </button>

        <div class="session-list" id="sessionList">
            <!-- 会话列表由 JS 动态渲染 -->
        </div>

        <div class="sidebar-footer">
            <button class="sidebar-theme-btn" id="sidebarThemeBtn">🌙 切换主题</button>
        </div>
    </aside>

    <!-- ===== 主内容 ===== -->
    <div class="main-wrapper">

        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <button class="menu-btn" id="menuBtn">☰</button>
                <span class="logo-icon">🧠</span>
                <span class="logo-text">DeepSeek</span>
                <span class="session-title" id="sessionTitle">新对话</span>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
                <button class="clear-btn" id="clearBtn" title="清空当前对话">🗑️</button>
            </div>
        </header>

        <!-- 聊天区域 -->
        <main class="chat-container" id="chatContainer">
            <div class="chat-box" id="chatBox">
                <div class="welcome-msg">
                    <div class="welcome-icon">👋</div>
                    <h2>你好，我是 DeepSeek</h2>
                    <p>随时为你解答问题，开始对话吧！</p>
                </div>
            </div>
        </main>

        <!-- 底部输入区 -->
        <footer class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="输入你的问题..." 
                    autocomplete="off"
                />
                <button id="sendBtn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="input-hint">按 Enter 发送 · 支持多轮对话</div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
